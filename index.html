<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday ❤️</title>
  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      color: white;
      text-align: center;
      overflow: hidden;
    }

    .container {
      margin-top: 100px;
      animation: fadeIn 2s ease-in-out;
    }

    h1 {
      font-size: 40px;
      animation: slideDown 1.5s ease;
    }

    p {
      font-size: 20px;
      margin: 20px;
    }

    .btn {
      padding: 12px 25px;
      background: white;
      color: #ff4d6d;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 20px;
    }

    .hidden {
      display: none;
    }

    .gallery img {
      width: 150px;
      margin: 10px;
      border-radius: 15px;
      animation: fadeIn 2s ease;
    }

    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    @keyframes slideDown {
      from {transform: translateY(-50px); opacity: 0;}
      to {transform: translateY(0); opacity: 1;}
    }
  </style>
</head>
<body>

  <!-- Musik -->
  <audio autoplay loop>
    <source src="lagu.mp3.mp3" type="audio/mpeg">
  </audio>

  <div class="container">
    <h1>Happy Birthday ❤️</h1>
    <p>aku punya sesuatu buat kamu...</p>
    <button class="btn" onclick="lanjut()">klik di sini</button>

    <div id="isi" class="hidden">
      <p>selamat ulang tahun yaa 🥺</p>
      <p>makasih udah hadir di hidup aku</p>
      <p>semoga semua yang kamu mau bisa tercapai</p>
      <p>dan semoga kita selalu bareng terus ❤️</p>

      <div class="gallery">
        <img src="1.jpg.jpeg">
        <img src="2.jpg.jpeg">
        <img src="3.jpg.jpeg">
        <img src="4.jpg.jpeg">
      </div>
    </div>
  </div>

  <script>
    function lanjut() {
      document.getElementById("isi").classList.remove("hidden");
    }
  </script>

</body>
</html>
