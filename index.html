<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday Sayangkuuu❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      color: white;
      text-align: center;
      overflow-x: hidden;
    }

    .container {
      margin-top: 60px;
      padding: 20px;
      animation: fadeIn 2s ease-in-out;
    }

    h1 {
      font-size: 32px;
      animation: slideDown 1.5s ease;
    }

    p {
      font-size: 18px;
      margin: 15px;
    }

    .btn {
      padding: 12px 25px;
      background: white;
      color: #ff4d6d;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 20px;
    }

    .hidden {
      display: none;
    }

    .gallery {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 20px;
    }

    .gallery img {
      width: 120px;
      margin: 10px;
      border-radius: 15px;
      animation: fadeIn 2s ease;
    }

    @media (max-width: 600px) {
      h1 { font-size: 24px; }
      p { font-size: 16px; }
      .gallery img { width: 100px; }
    }

    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    @keyframes slideDown {
      from {transform: translateY(-50px); opacity: 0;}
      to {transform: translateY(0); opacity: 1;}
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Happy Birthday Deaaaaa ❤️</h1>
    <p>Aku punya sesuatu nih buat kamuu 🎉</p>

    <button class="btn" onclick="showSurprise()">Dibukaa yaa cantikk 🎁</button>

    <div id="surprise" class="hidden">
      <p>
        Selamat ulang tahun yaa sayangg 💖<br>
        aku mau ngucapin makasih udah selalu ada buat aku,<br>
        aku cuman berharap semoga kamu selalu bahagia,<br>
        sehat terus, dan semua impian kamu tercapai ✨<br><br>
        I love you SOOOOOOO MUCHHH MWAHH MWAHH ❤️
      </p>

      <div class="gallery">
        <img src="1.jpg.jpeg">
        <img src="2.jpg.jpeg">
        <img src="3.jpg.jpeg">
        <img src="4.jpg.jpeg">
      </div>
    </div>
  </div>

  <!-- Musik -->
  <audio id="music" src="lagu.mp3.mp3"></audio>

  <script>
    function showSurprise() {
      document.getElementById("surprise").classList.remove("hidden");

      let music = document.getElementById("music");
      music.play();
    }
  </script>

</body>
</html>
